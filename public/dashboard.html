<!DOCTYPE html>
<html>
<head>
  <title>Insurance CRM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f4f6f9;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #1e293b;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: #334155;
      border: none;
      color: white;
      cursor: pointer;
    }

    .sidebar button:hover {
      background: #475569;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* Cards */
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    /* Table */
    table {
      width: 100%;
      background: white;
      border-radius: 10px;
      border-collapse: collapse;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #f1f5f9;
      text-align: left;
    }

    /* Button */
    .btn {
      padding: 6px 12px;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    .btn-add { background: #22c55e; color: white; }
    .btn-del { background: #ef4444; color: white; }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.5);
    }

    .modal-content {
      background: white;
      padding: 20px;
      margin: 10% auto;
      width: 300px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }
  </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>🚗 Insurance</h2>
  <button onclick="showDashboard()">Dashboard</button>
  <button onclick="showCustomers()">Customers</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- Main -->
<div class="main">

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="cards">
      <div class="card">
        <h3 id="c_total">0</h3>
        <p>Customers</p>
      </div>
      <div class="card">
        <h3 id="c_policy">0</h3>
        <p>Policies</p>
      </div>
      <div class="card">
        <h3 id="c_money">0</h3>
        <p>Revenue</p>
      </div>
    </div>
  </div>

  <!-- Customers -->
  <div id="customers" style="display:none;">
    <button class="btn btn-add" onclick="openModal()">+ เพิ่มลูกค้า</button>

    <table>
      <thead>
        <tr>
          <th>ชื่อ</th>
          <th>เบอร์</th>
          <th>รถ</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>

</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>เพิ่มลูกค้า</h3>
    <input id="name" placeholder="ชื่อ">
    <input id="phone" placeholder="เบอร์">
    <input id="car" placeholder="รถ">
    <button class="btn btn-add" onclick="add()">บันทึก</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
