<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>🚗 Insurance</h2>
    <ul>
      <li>📊 Dashboard</li>
      <li>👤 ลูกค้า</li>
      <li>📝 กรมธรรม์</li>
      <li>💰 รายงาน</li>
    </ul>
  </aside>

  <!-- Main -->
  <main class="main">

    <header class="header">
      <h1>Dashboard</h1>
      <button onclick="logout()">Logout</button>
    </header>

    <section class="cards">
      <div class="card">💰 รายได้<br><b>120,000</b></div>
      <div class="card">📄 กรมธรรม์<br><b>350</b></div>
      <div class="card">👥 ลูกค้า<br><b>89</b></div>
    </section>

  </main>
</div>

<script>
function logout(){
  localStorage.removeItem("token");
  window.location.href = "/";
}
</script>

</body>
</html>
